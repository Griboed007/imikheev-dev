# This is shown to AI when creating artifacts.
context: |
  # Project context — imikheev.dev

  **Thesis:** the portfolio is a digital twin of Ivan's work. Every moving element maps to
  live state; the site is built with the framework it documents.

  **Positioning:** "I engineer adoption" — interfaces between intelligent systems and the
  people who use them: protocols, products, teams.

  **Sections (routes):** `/` (hero, map, band, work, story, education, hackathons, methods,
  statusline, life, motto) · `/work/[slug]` (field-manual case pages) ·
  `/methods/[slug]` (framework + future methods) · `/cv.pdf`.

  **Sources of truth:**
  - behavior + tests → `openspec/changes/*/proposal.md`
  - look → `design/reference/portfolio-mockup-v0.8.html` + `design/tokens.md`
  - method → `content/methods/spec-driven-agents.md`
  - durable spec → `openspec/specs/` (grows only via archived changes)

  **Change order is dependency order.** 001 → 011. Do not start N+1 before N passed its
  live DoD.

